<!DOCTYPE html>

  <meta charset="utf-8"/>

  <title>Link Bio</title>

  <style>
    body{
      margin:0;
      background:#111317;
      color:#fff;
      font-family:Arial;
    }

    .wrap{
      max-width:430px;
      margin:auto;
      padding:20px;
    }

    .head{
      text-align:center;
    }

    
.avatar{
      width:110px;
      height:110px;
      border-radius:50%;
      object-fit:cover;
      border:3px solid #00d5ff;
      box-shadow:0 0 10px rgba(255,255,255,.45),0 0 20px rgba(255,255,255,.30),0 0 35px rgba(255,255,255,.18);
      animation:avatarGlow 3s ease-in-out infinite;
    }
@keyframes avatarGlow{
0%,100%{box-shadow:0 0 10px rgba(255,255,255,.40),0 0 20px rgba(255,255,255,.25),0 0 35px rgba(255,255,255,.15);}
50%{box-shadow:0 0 16px rgba(255,255,255,.60),0 0 30px rgba(255,255,255,.40),0 0 50px rgba(255,255,255,.22);}
}


    .grid{
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:12px;
      margin:20px 0;
    }

    .card{
      background:#20242b;
      padding:10px;
      border-radius:14px;
      text-align:center;
      cursor:pointer;
    }

    .card img{
      width:100%;
      aspect-ratio:16/9;
      object-fit:cover;
      border-radius:10px;
    }

    .contact a{display:block;background:#20242b;color:#fff;text-decoration:none;padding:12px;border-radius:10px;margin:8px 0;}#pop{display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,.75);backdrop-filter:blur(8px);justify-content:center;align-items:center;z-index:99999}.popup-box{position:relative;width:90%;max-width:370px;background:#171b22;border-radius:25px;padding:25px;text-align:center;overflow:hidden;box-shadow:0 0 20px #ff3cac,0 0 45px #ff3cac}.popup-box::before{content:"";position:absolute;inset:-2px;border-radius:25px;background:linear-gradient(90deg,#ff3cac,#ff69d9,#ff3cac,#ff85e1,#ff3cac);background-size:400%;animation:borderRun 6s linear infinite;filter:blur(2px);z-index:-2}.popup-box::after{content:"";position:absolute;inset:3px;background:#171b22;border-radius:22px;z-index:-1}.btn{display:block;padding:18px;margin:15px 0;border-radius:18px;text-decoration:none;color:#fff;font-weight:bold}.green{background:#ff3cac}.red{background:#ff3cac}.close-btn{position:absolute;top:12px;right:12px;width:42px;height:42px;border:none;border-radius:50%;background:#ff3cac;color:#fff}@keyframes borderRun{0%{background-position:0}100%{background-position:400%}}
  </style>

<style>
.petal{
    position:fixed;top:-20px;width:16px;height:16px;
    background:linear-gradient(135deg,#ffd6e7,#ff8fb8);
    border-radius:70% 0 70% 0;opacity:.9;pointer-events:none;z-index:9999;
    animation:petalFall linear forwards;
    box-shadow:0 0 6px rgba(255,182,193,.5);
}
@keyframes petalFall{
0%{transform:translate(0,-20px) rotate(0deg);opacity:0;}
10%{opacity:1;}
50%{transform:translate(60px,50vh) rotate(360deg);}
100%{transform:translate(-80px,110vh) rotate(720deg);opacity:0;}
}
</style>


<style>
.sakura{position:fixed;left:0;top:0;pointer-events:none;z-index:99999;animation:petalClick 1.8s ease-out forwards;}
.sakura::before{content:"❄️";font-size:var(--size);display:block;}
@keyframes petalClick{
0%{transform:translate(-50%,-50%) scale(.2) rotate(0);opacity:1;}
100%{transform:translate(calc(-50% + var(--x)),calc(-50% + var(--y))) rotate(720deg) scale(1);opacity:0;}
}
</style>

<style>
.search-box{margin:15px 0}
#searchInput{width:100%;padding:12px;border-radius:30px;border:2px solid #ff3cac;background:#171b22;color:#fff;box-shadow:0 0 12px #ff3cac;outline:none}
.keyword-bar{display:flex;gap:8px;flex-wrap:wrap;justify-content:center;margin-top:10px}
.keyword{padding:8px 14px;border-radius:20px;background:#171b22;border:1px solid #ff3cac;color:#fff;box-shadow:0 0 10px #ff3cac;cursor:pointer}
</style>
<style>#welcomePopup{position:fixed;inset:0;background:rgba(0,0,0,.75);display:flex;justify-content:center;align-items:center;z-index:1000000}.welcomeBox{position:relative;width:90%;max-width:360px;padding:22px;background:#171b22;border-radius:22px;text-align:center;box-shadow:0 0 20px #00e5ff}.welcomeBox:before{content:"";position:absolute;inset:-2px;background:linear-gradient(90deg,#00e5ff,#00ffcc,#00e5ff);background-size:300%;animation:borderRun 5s linear infinite;z-index:-1}.popupImg{width:100%;border-radius:14px;margin:12px 0}.ytBtn,.closeBtn{display:block;padding:12px;border-radius:14px;margin-top:10px;text-decoration:none;font-weight:bold}.ytBtn{background:red;color:#fff}.closeBtn{width:100%;background:#00e5ff}.closePopup{position:absolute;top:8px;right:8px}</style></head>

<script>
function createPetal(){
 const petal=document.createElement("div");
 petal.className="petal";
 petal.style.left=Math.random()*window.innerWidth+"px";
 petal.style.width=(10+Math.random()*12)+"px";
 petal.style.height=petal.style.width;
 petal.style.animationDuration=(12+Math.random()*8)+"s";
 document.body.appendChild(petal);
 setTimeout(()=>petal.remove(),20000);
}
setInterval(createPetal,700);
</script>


<audio id="bgMusic" loop>
<source src="https://gaumodz.github.io/gaumodzgau.github.io/music.mp3" type="audio/mpeg">
</audio>
<button id="musicBtn">🎵</button>
<style>
#musicBtn{position:fixed;right:20px;bottom:20px;width:60px;height:60px;border-radius:50%;border:2px solid #fff;background:#000;color:#fff;font-size:28px;cursor:pointer;z-index:9999;box-shadow:0 0 8px #fff,0 0 18px #00e5ff;transition:.3s}
#musicBtn.playing{animation:spin 2s linear infinite,glow 1.5s ease-in-out infinite alternate}
@keyframes spin{from{transform:rotate(0)}to{transform:rotate(360deg)}}
@keyframes glow{from{box-shadow:0 0 8px #fff,0 0 15px #00e5ff}to{box-shadow:0 0 15px #fff,0 0 35px #00e5ff}}
</style>
<script>
const music=document.getElementById("bgMusic"),btn=document.getElementById("musicBtn");let playing=false;
btn.onclick=function(){if(!playing){music.play();btn.classList.add("playing");btn.innerHTML="🔊";playing=true;}else{music.pause();btn.classList.remove("playing");btn.innerHTML="🔇";playing=false;}}
</script>


<script>
document.addEventListener("pointerdown",function(e){
 const petals=5,radius=10;
 for(let i=0;i<petals;i++){
  const flower=document.createElement("div");
  flower.className="sakura";
  flower.style.left=e.clientX+"px";
  flower.style.top=e.clientY+"px";
  const angle=(Math.PI*2/petals)*i;
  const random=Math.random()*40;
  flower.style.setProperty("--x",(Math.cos(angle)*(radius+random))+"px");
  flower.style.setProperty("--y",(Math.sin(angle)*(radius+random))+"px");
  flower.style.setProperty("--size",(10+Math.random()*8)+"px");
  document.body.appendChild(flower);
  setTimeout(()=>flower.remove(),1800);
 }
});
</script>

<script>
const s=document.getElementById('searchInput');
function filterMods(k){s.value=k;doFilter();}
function doFilter(){
const q=s.value.toLowerCase();
document.querySelectorAll('.card').forEach(c=>{
c.style.display=c.innerText.toLowerCase().includes(q)?'':'none';
});
}
s.addEventListener('input',doFilter);
</script>
<script>function closeWelcome(){document.getElementById("welcomePopup").style.display="none";}</script></body>
