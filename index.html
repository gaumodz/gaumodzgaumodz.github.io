<!-- Nhạc nền -->
<audio id="bgMusic" loop>
    <source src="https://gaumodz.github.io/gaumodzgau.github.io/music.mp3" type="audio/mpeg">
</audio>

<!-- Nút nhạc -->
<button id="musicBtn">🎵</button>

<style>
#musicBtn{
    position:fixed;
    right:20px;
    bottom:20px;
    width:60px;
    height:60px;
    border-radius:50%;
    border:2px solid #fff;
    background:#000;
    color:#fff;
    font-size:28px;
    cursor:pointer;
    z-index:9999;
    box-shadow:0 0 8px #fff,0 0 18px #00e5ff;
    transition:.3s;
}

#musicBtn:hover{
    transform:scale(1.1);
}

#musicBtn.playing{
    animation:spin 2s linear infinite, glow 1.5s ease-in-out infinite alternate;
}

@keyframes spin{
    from{transform:rotate(0deg);}
    to{transform:rotate(360deg);}
}

@keyframes glow{
    from{
        box-shadow:0 0 8px #fff,0 0 15px #00e5ff;
    }
    to{
        box-shadow:0 0 15px #fff,0 0 35px #00e5ff;
    }
}
</style>

<script>
const music=document.getElementById("bgMusic");
const btn=document.getElementById("musicBtn");

let playing=false;

btn.onclick=function(){

    if(!playing){

        music.play();

        btn.classList.add("playing");

        btn.innerHTML="🔊";

        playing=true;

    }else{

        music.pause();

        btn.classList.remove("playing");

        btn.innerHTML="🔇";

        playing=false;

    }

}
</script>
  <style>
.petal{
    position:fixed;
    top:-20px;
    width:16px;
    height:16px;
    background:linear-gradient(135deg,#ffd6e7,#ff8fb8);
    border-radius:70% 0 70% 0;
    opacity:.9;
    pointer-events:none;
    z-index:9999;
    animation:petalFall linear forwards;
    box-shadow:0 0 6px rgba(255,182,193,.5);
}

@keyframes petalFall{
    0%{
        transform:translate(0,-20px) rotate(0deg);
        opacity:0;
    }
    10%{
        opacity:1;
    }
    50%{
        transform:translate(60px,50vh) rotate(360deg);
    }
    100%{
        transform:translate(-80px,110vh) rotate(720deg);
        opacity:0;
    }
}
</style>

<script>
function createPetal(){
    const petal=document.createElement("div");
    petal.className="petal";

    petal.style.left=Math.random()*window.innerWidth+"px";
    petal.style.width=(10+Math.random()*12)+"px";
    petal.style.height=petal.style.width;
    petal.style.animationDuration=(6+Math.random()*5)+"s";

    document.body.appendChild(petal);

    setTimeout(()=>{
        petal.remove();
    },12000);
}

setInterval(createPetal,180);
</script>
