<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="utf-8"/>
  <meta content="width=device-width,initial-scale=1" name="viewport"/>
  <title>Link Bio</title>

  <style>
    body{
      margin:0;
      background:#111317;
      color:#fff;
      font-family:Arial;
    }

    .wrap{
      max-width:430px;
      margin:auto;
      padding:20px;
    }

    .head{
      text-align:center;
    }

    .avatar{
      width:110px;
      height:110px;
      border-radius:50%;
      object-fit:cover;
      border:3px solid #00d5ff;
    }

    .grid{
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:12px;
      margin:20px 0;
    }

    .card{
      background:#20242b;
      padding:10px;
      border-radius:14px;
      text-align:center;
      cursor:pointer;
    }

    .card img{
      width:100%;
      aspect-ratio:16/9;
      object-fit:cover;
      border-radius:10px;
    }

    .contact a{display:block;background:#20242b;color:#fff;text-decoration:none;padding:12px;border-radius:10px;margin:8px 0;}#pop{display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,.75);backdrop-filter:blur(8px);justify-content:center;align-items:center;z-index:99999}.popup-box{position:relative;width:90%;max-width:370px;background:#171b22;border-radius:25px;padding:25px;text-align:center;overflow:hidden;box-shadow:0 0 20px #ff3cac,0 0 45px #ff3cac}.popup-box::before{content:"";position:absolute;inset:-2px;border-radius:25px;background:linear-gradient(90deg,#ff3cac,#ff69d9,#ff3cac,#ff85e1,#ff3cac);background-size:400%;animation:borderRun 6s linear infinite;filter:blur(2px);z-index:-2}.popup-box::after{content:"";position:absolute;inset:3px;background:#171b22;border-radius:22px;z-index:-1}.btn{display:block;padding:18px;margin:15px 0;border-radius:18px;text-decoration:none;color:#fff;font-weight:bold}.green{background:#ff3cac}.red{background:#ff3cac}.close-btn{position:absolute;top:12px;right:12px;width:42px;height:42px;border:none;border-radius:50%;background:#ff3cac;color:#fff}@keyframes borderRun{0%{background-position:0}100%{background-position:400%}}
  </style>
</head>

<body>

<div class="wrap">

  <div class="head">
    <img class="avatar" src="https://via.placeholder.com/150">
    <h2>TÊN</h2>
    <p>Mô tả</p>
  </div>

  <div class="grid">

    <div class="card" onclick="openBox('LINK_THUONG','LINK_MAX')">
      <img src="https://via.placeholder.com/300x170">
      <h3>MOD 1</h3>
      <p>Mô tả</p>
    </div>

    <div class="card" onclick="openBox('LINK_THUONG','LINK_MAX')">
      <img src="https://via.placeholder.com/300x170">
      <h3>MOD 2</h3>
      <p>Mô tả</p>
    </div>

    <div class="card" onclick="openBox('LINK_THUONG','LINK_MAX')">
      <img src="https://via.placeholder.com/300x170">
      <h3>MOD 3</h3>
      <p>Mô tả</p>
    </div>

    <div class="card" onclick="openBox('LINK_THUONG','LINK_MAX')">
      <img src="https://via.placeholder.com/300x170">
      <h3>MOD 4</h3>
      <p>Mô tả</p>
    </div>

  </div>

  <div class="contact">
    <h3>Thông tin liên hệ</h3>

    <a href="#">Hướng dẫn</a>
    <a href="#">YouTube</a>
    <a href="#">TikTok</a>
    <a href="#">Telegram</a>
    <a href="#">Zalo</a>
  </div>

</div>

<div id="pop"><div class="popup-box"><button class="close-btn" onclick="closeBox()">✖</button><h2>📢 VUI LÒNG CHỌN PHIÊN BẢN</h2><a class="btn green" id="n">🟢 FREE FIRE THƯỜNG</a><a class="btn red" id="m">🔴 FREE FIRE MAX</a></div></div>

<script>
function openBox(a,b){
  document.getElementById('pop').style.display='flex';
  n.href=a;
  m.href=b;
}

function closeBox(){
  pop.style.display='none';
}
</script>

</body>
</html>
