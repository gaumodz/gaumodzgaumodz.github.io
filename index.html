<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="utf-8"/>
  <meta content="width=device-width,initial-scale=1" name="viewport"/>
  <title>GẤU MODZ</title>

  <style>
    body{
      margin:0;
      background:#111317;
      color:#fff;
      font-family:Arial;
    }

    .wrap{
      max-width:430px;
      margin:auto;
      padding:20px;
    }

    .head{
      text-align:center;
    }

    .avatar{
      width:110px;
      height:110px;
      border-radius:50%;
      object-fit:cover;
      border:3px solid #00d5ff;
    }

    .grid{
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:12px;
      margin:20px 0;
    }

    .card{
      background:#20242b;
      padding:10px;
      border-radius:14px;
      text-align:center;
      cursor:pointer;
    }

    .card img{
      width:100%;
      aspect-ratio:16/9;
      object-fit:cover;
      border-radius:10px;
    }

    .contact a,
    .btn{
      display:block;
      background:#20242b;
      color:#fff;
      text-decoration:none;
      padding:12px;
      border-radius:10px;
      margin:8px 0;
      text-align:center;
    }

    #pop{
      display:none;
      position:fixed;
      inset:0;
      background:#0008;
      align-items:center;
      justify-content:center;
    }

    .box{
      background:#1b1f26;
      padding:20px;
      border-radius:16px;
      width:85%;
      max-width:320px;
    }
  </style>
</head>

<body>

<div class="wrap">

  <div class="head">
    <img class="avatar" src="https://sf-static.upanhlaylink.com/img/image_20260718a071d084067cedfc4a1596a3182dc950.jpg">
    <h2>GẤU MODZ</h2>
    <p>SHARE MOD SKIN FREE FIRE</p>
  </div>

  <div class="grid">

    <div class="card" onclick="openBox('LINK_THUONG','LINK_MAX')">
      <img src="https://sf-static.upanhlaylink.com/img/image_2026071807921386c468f691b753e4ee3defa006.jpg">
      <h3>MOD SKIN 1</h3>
      <p>NHÂN VẬT IGNIS</p>
    </div>

    <div class="card" onclick="openBox('https://link4m.org/B3RAag','https://link4m.net/T31K3')">
      <img src="https://via.placeholder.com/300x170">
      <h3>MOD 2</h3>
      <p>Mô tả</p>
    </div>

    <div class="card" onclick="openBox('LINK_THUONG','LINK_MAX')">
      <img src="https://via.placeholder.com/300x170">
      <h3>MOD 3</h3>
      <p>Mô tả</p>
    </div>

    <div class="card" onclick="openBox('LINK_THUONG','LINK_MAX')">
      <img src="https://via.placeholder.com/300x170">
      <h3>MOD 4</h3>
      <p>Mô tả</p>
    </div>

  </div>

  <div class="contact">
    <h3>Thông tin liên hệ</h3>

    <a href="#">Hướng dẫn</a>
    <a href="#">YouTube</a>
    <a href="#">TikTok</a>
    <a href="#">Telegram</a>
    <a href="#">Zalo</a>
  </div>

</div>

<div id="pop">
  <div class="box">
    <h3>Chọn phiên bản</h3>

    <a class="btn" id="n">🟢 Free Fire Thường</a>
    <a class="btn" id="m">🔴 Free Fire MAX</a>
    <a class="btn" href="javascript:closeBox()">❌ Đóng</a>
  </div>
</div>

<script>
function openBox(a,b){
  document.getElementById('pop').style.display='flex';
  document.getElementById('n').href = a;
  document.getElementById('m').href = b;
}

function closeBox(){
  document.getElementById('pop').style.display='none';
}
</script>

</body>
        </html>
